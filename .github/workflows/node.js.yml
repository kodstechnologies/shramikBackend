name: Deploy Shramik Backend to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/azure_key.pem
          chmod 600 ~/.ssh/azure_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload backend using rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/azure_key.pem -o StrictHostKeyChecking=no" \
            --exclude=node_modules \
            --exclude=.git \
            ./ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/azureuser/shramikBackend

      - name: Create .env file on Azure VM
        run: |
          ssh -i ~/.ssh/azure_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/azureuser/shramikBackend
            echo "${{ secrets.BACKENDENV }}" > .env
            chmod 600 .env
          EOF

      - name: Install dependencies & restart backend
        run: |
          ssh -i ~/.ssh/azure_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/azureuser/shramikBackend

            npm install

            if ! command -v pm2 >/dev/null 2>&1; then
              sudo npm install -g pm2
            fi

            pm2 stop shramik-backend || true
            pm2 delete shramik-backend || true
            pm2 start server.js --name shramik-backend
            pm2 save
          EOF
