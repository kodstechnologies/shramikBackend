name: shramikBackend CI/CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Create env file
        run: |
          echo "${{ secrets.BACKENDENV }}" > .env

      - name: Copy files to production directory
        run: |
          sudo mkdir -p /var/www/shramikBackend
          sudo rsync -av --delete ./ /var/www/shramikBackend/
          sudo chown -R ubuntu:ubuntu /var/www/shramikBackend

      - name: Start or restart backend with PM2
        run: |
          cd /var/www/shramikBackend
          if pm2 describe shramikBackend > /dev/null; then
            pm2 restart sramik-backend --update-env
          else
            pm2 start server.js --name shramikBackend
          fi

      - name: Save PM2 process list
        run: pm2 save
