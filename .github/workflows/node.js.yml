name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create env file
        run: |
          echo "${{ secrets.backendenv }}" > .env

      - name: Start or restart backend with PM2
        run: |
          if pm2 describe sramik-backend > /dev/null; then
            pm2 restart sramik-backend --update-env
          else
            pm2 start server.js --name sramik-backend
          fi

      - name: Save PM2 process list
        run: pm2 save
