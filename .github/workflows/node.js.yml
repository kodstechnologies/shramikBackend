name: shramikBackend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env inside _work
        run: |
          echo "${{ secrets.backendenv }}" > .env

      - name: Start or restart backend with PM2
        run: |
          pm2 restart shramikBackend --update-env || pm2 start server.js --name shramikBackend
          pm2 save
